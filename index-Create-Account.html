    <section class="content">
      <div class="back-video">
        <p>بيانات انشاء الحساب</p>
        <form id="createAccountForm" class="row g-3">
          <div class="col-12">
            <label class="form-label">الصورة الشخصية</label>
            <input type="file" class="form-control" accept="image/*" />
          </div>

          <div class="col-md-6">
            <label class="form-label">الاسم الاول</label>
            <input
              type="text"
              class="form-control"
              placeholder="الاسم الاول"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">الاسم الاخير</label>
            <input
              type="text"
              class="form-control"
              placeholder="الاسم الاخير"
              required
            />
          </div>

          <div class="col-12">
            <label class="form-label">اسم المستخدم</label>
            <input
              type="text"
              class="form-control"
              placeholder="اسم المستخدم (Username)"
              required
            />
          </div>

          <div class="col-12">
            <label class="form-label">البريد الالكتروني</label>
            <input
              type="email"
              class="form-control"
              placeholder="البريد الالكتروني"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">كلمة المرور</label>
            <input
              type="password"
              class="form-control"
              placeholder="كلمة المرور"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">تأكيد كلمة المرور</label>
            <input
              type="password"
              class="form-control"
              placeholder="تأكيد كلمة المرور"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">الفرقة</label>
            <input type="text" class="form-control" placeholder="الفرقة" />
          </div>

          <div class="col-md-6">
            <label class="form-label">الشعبة</label>
            <input type="text" class="form-control" placeholder="الشعبة" />
          </div>

          <div class="col-12">
            <label class="form-label">رقم الهاتف</label>
            <input
              type="tel"
              class="form-control"
              placeholder="رقم الهاتف / واتساب"
              required
            />
          </div>

          <div class="col-12">
            <label class="form-label">العنوان</label>
            <input type="text" class="form-control" placeholder="العنوان" />
          </div>

          <div class="col-12">
            <label class="form-label">كيف عرفت عنا</label>
            <select class="form-control">
              <option>كيف عرفت عنا؟</option>
              <option>صديق</option>
              <option>فيسبوك</option>
              <option>اعلان</option>
              <option>جروب</option>
            </select>
          </div>

          <div class="col-12 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="notifications"
            />
            <label class="form-check-label"
              >أوافق على استقبال رسائل/إشعارات</label
            >
          </div>

          <div class="col-12 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="terms"
              required
            />
            <label class="form-check-label">الموافقة على الشروط والأحكام</label>
          </div>

          <div class="col-12 text-end btnsab">
            <button type="submit" class="btn btn-warning px-5 py-2">
              Create Account
            </button>
          </div>
        </form>
      </div>
